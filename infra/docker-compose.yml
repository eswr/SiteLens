services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sitelens-postgres
    environment:
      POSTGRES_DB: sitelens
      POSTGRES_USER: sitelens
      POSTGRES_PASSWORD: sitelens
    ports:
      - "54329:5432"
    volumes:
      - sitelens_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitelens -d sitelens"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sitelens-redis
    ports:
      - "6389:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - sitelens_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sitelens_postgres_data:
  sitelens_redis_data:
