name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality (no services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  integration:
    name: Integration (PostGIS + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: sitelens
          POSTGRES_USER: sitelens
          POSTGRES_PASSWORD: sitelens
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sitelens -d sitelens"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgres://sitelens:sitelens@localhost:5432/sitelens
      REDIS_URL: redis://localhost:6379
      CACHE_ENABLED: "true"
      ENABLE_DEMO_BILLING: "true"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:seed:billing
      - run: npm run ingest:geojson
      - run: npm run test:db -w apps/api
